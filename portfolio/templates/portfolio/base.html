{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Shaun Milligan's Portfolio" />
    <meta name="author" content="Shaun Milligan" />

    <title>{% block title %}Shaun's Portfolio{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon"
          href="{% static 'portfolio/assets/favicon.ico' %}" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap"
          rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css"
          rel="stylesheet" />

    <!-- Theme CSS -->
    <link href="{% static 'portfolio/css/styles.css' %}" rel="stylesheet" />
</head>

<body class="d-flex flex-column h-100 body">
    <main class="flex-shrink-0">

    <!-- Navbar -->
    {% include "portfolio/partials/navbar.html" %}

    <!-- Main Page Content -->
    <!-- <main class="flex-shrink-0"> -->
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    {% include "portfolio/partials/footer.html" %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Theme JS -->
    <script src="{% static 'portfolio/js/scripts.js' %}"></script>

</body>
</html>
